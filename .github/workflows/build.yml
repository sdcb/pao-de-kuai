name: Build

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "external/**"
      - "src/**"
      - "tests/**"
      - "assets/pao-de-kuai.ico"
      - "assets/poker-cards.png"
      - "assets/audio/*.mp3"
  pull_request:
    paths:
      - ".github/workflows/build.yml"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "external/**"
      - "src/**"
      - "tests/**"
      - "assets/pao-de-kuai.ico"
      - "assets/poker-cards.png"
      - "assets/audio/*.mp3"
  workflow_dispatch:

jobs:
  build:
    name: Windows ${{ matrix.name }}
    runs-on: windows-2025-vs2026
    env:
      VSLANG: "1033"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x64 /MD
            arch: x64
            vcvars_arch: x64
            build_dir: build-vs2026-md-x64
            runtime: MD
            use_vc_ltl: OFF
            run_tests: true
          - name: x86 /MD
            arch: x86
            vcvars_arch: x86
            build_dir: build-vs2026-md-x86
            runtime: MD
            use_vc_ltl: OFF
            run_tests: true
          - name: arm64 /MD
            arch: arm64
            vcvars_arch: x64_arm64
            build_dir: build-vs2026-md-arm64
            runtime: MD
            use_vc_ltl: OFF
            run_tests: false
          - name: x64 /MT
            arch: x64
            vcvars_arch: x64
            build_dir: build-vs2026-mt-x64
            runtime: MT
            use_vc_ltl: OFF
            run_tests: true
          - name: x86 /MT
            arch: x86
            vcvars_arch: x86
            build_dir: build-vs2026-mt-x86
            runtime: MT
            use_vc_ltl: OFF
            run_tests: true
          - name: arm64 /MT
            arch: arm64
            vcvars_arch: x64_arm64
            build_dir: build-vs2026-mt-arm64
            runtime: MT
            use_vc_ltl: OFF
            run_tests: false
          - name: x64 VC-LTL
            arch: x64
            vcvars_arch: x64
            build_dir: build-vs2026-vcltl-x64
            runtime: MT
            use_vc_ltl: ON
            run_tests: true
          - name: x86 VC-LTL
            arch: x86
            vcvars_arch: x86
            build_dir: build-vs2026-vcltl-x86
            runtime: MT
            use_vc_ltl: ON
            run_tests: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.vcvars_arch }}
          cmake -S . -B ${{ matrix.build_dir }} -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DPDK_BUILD_TESTS=ON -DPDK_MSVC_RUNTIME=${{ matrix.runtime }} -DPDK_USE_VC_LTL=${{ matrix.use_vc_ltl }}

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.vcvars_arch }}
          cmake --build ${{ matrix.build_dir }}

      - name: Test
        if: ${{ matrix.run_tests }}
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.vcvars_arch }}
          ctest --test-dir ${{ matrix.build_dir }} --output-on-failure

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: pao-de-kuai-${{ matrix.build_dir }}
          path: ${{ matrix.build_dir }}/pao_de_kuai.exe
          if-no-files-found: error

      - name: Upload x64 VC-LTL app to MinIO
        if: ${{ matrix.name == 'x64 VC-LTL' }}
        shell: pwsh
        run: |
          aws s3 cp "${{ matrix.build_dir }}/pao_de_kuai.exe" "s3://${{ vars.MINIO_BUCKET }}/2026/pao-de-kuai.exe" `
            --endpoint-url "${{ secrets.MINIO_HOST }}" `
            --content-type "application/vnd.microsoft.portable-executable" `
            --no-progress
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
